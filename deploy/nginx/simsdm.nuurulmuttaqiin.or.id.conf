# HRIS Admin — simsdm.nuurulmuttaqiin.or.id
# Laravel + Inertia + Vite (SPA). Letakkan di /etc/nginx/sites-available/ lalu symlink ke sites-enabled.
# SESUAIKAN: web root & socket php-fpm.
# Setelah `certbot --nginx` dijalankan, certbot akan otomatis menambah blok 443 + SSL + redirect HTTPS.

server {
    listen 80;
    server_name simsdm.nuurulmuttaqiin.or.id www.simsdm.nuurulmuttaqiin.or.id;

    # === SESUAIKAN PATH INI ===
    root /var/www/hris/public;
    index index.php;

    client_max_body_size 10M;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;

    # Proteksi terhadap akses ke file sensitif
    location ~ /\.(?!well-known).* {
        deny all;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP via php-fpm (ubah versi socket sesuai php yang terpasang)
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 120s;
    }

    # Asset Vite (public/build) — cache lama
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff2?|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
